// Boltrope orchestrator wire contract (the client-facing edge).
//
// OrchestratorService is the system's only "brain": it runs the gather -> act ->
// verify agent loop, drives turns, enforces permissions and hooks, manages the
// context/token budget, spawns depth-limited sub-agents, and persists/replays the
// event-sourced log to PostgreSQL via an in-process package. This proto is the
// client (CLI/IDE/CI/SDK) -> orchestrator boundary; a REST/JSON facade is added
// later over these same definitions, via google.api.http annotations and a
// buf.build/googleapis/googleapis dependency, generated by a grpc-gateway plugin
// wired into buf.gen.yaml at that time. No such annotations exist yet
// (architecture 4.1, spec 7.1).
//
// Resumability is first-class: Run server-streams EventFrames each carrying a
// per-session seq (a Last-Event-ID); a reconnecting client resumes via after_seq
// on Run or via Control.Reattach, receiving only events with seq greater than the
// supplied value (spec 7.1, FR-API-01/02).
syntax = "proto3";

package boltrope.v1;

import "boltrope/v1/common.proto";

// OrchestratorService is the client-facing agent-control surface.
service OrchestratorService {
  // CreateSession creates a new session (a fresh event-sourcing stream) for a
  // tenant and returns its id. A session is the aggregate one agent task runs in;
  // it can later be run, resumed, forked, and replayed (spec 8.2).
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);

  // GetSession returns the current materialized state of a session (status, head
  // sequence, accumulated usage/cost, mode, lineage). It is a read-only
  // projection of the event log used to inspect or resume a session.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);

  // Run submits a user turn and server-streams resumable RunEvents until the turn
  // reaches a terminal Result (or the relay stall deadline detaches the client,
  // which then reattaches). The request carries an optional after_seq /
  // last_event_id; the server replays only events with seq greater than it, so a
  // reconnecting client never loses or duplicates frames (FR-API-01). Control
  // actions (approve/deny/interrupt/reattach) travel on the separate unary Control
  // RPC, not this stream.
  rpc Run(RunRequest) returns (stream RunEvent);

  // Control performs an out-of-band control action on a session — Approve, Deny,
  // Interrupt, or Reattach — keyed by session_id and decoupled from the Run data
  // stream (architecture 4.2, FR-API-02). Every call verifies the caller owns the
  // session; a foreign-tenant target returns PERMISSION_DENIED.
  rpc Control(ControlRequest) returns (ControlResponse);

  // Fork creates a new child session branching from a parent session at at_seq;
  // the child's sequence continues from at_seq+1 and the parent is unaffected
  // (FR-STATE-03). The caller's tenant must own the parent; a foreign-tenant fork
  // returns PERMISSION_DENIED.
  rpc Fork(ForkRequest) returns (ForkResponse);
}

// PermissionMode is the session's operating mode for the allow/deny/ask pipeline,
// settable server-side per session (FR-PERM-02). bypass is operator-only, audited,
// and forbidden under untrusted content or multi-tenant; it never disables the
// egress broker or tenant isolation (architecture 8.13).
enum PermissionMode {
  // PERMISSION_MODE_UNSPECIFIED is the unset value; the server applies its
  // configured default (equivalent to PERMISSION_MODE_DEFAULT).
  PERMISSION_MODE_UNSPECIFIED = 0;
  // PERMISSION_MODE_DEFAULT applies the standard allow/deny/ask pipeline.
  PERMISSION_MODE_DEFAULT = 1;
  // PERMISSION_MODE_ACCEPT_EDITS auto-approves file-mutation tools; other gated
  // tools (e.g. bash) still require approval.
  PERMISSION_MODE_ACCEPT_EDITS = 2;
  // PERMISSION_MODE_PLAN keeps the session read-only until a human approves a
  // plan.
  PERMISSION_MODE_PLAN = 3;
  // PERMISSION_MODE_BYPASS collapses all ask gates. Operator-only and audited;
  // forbidden under untrusted content or multi-tenant mode and never settable by
  // a client request or the model.
  PERMISSION_MODE_BYPASS = 4;
}

// SessionStatus is the lifecycle state of a session, derived from the event log.
enum SessionStatus {
  // SESSION_STATUS_UNSPECIFIED is the unset value.
  SESSION_STATUS_UNSPECIFIED = 0;
  // SESSION_STATUS_ACTIVE means the session may still append events (it is
  // runnable/resumable).
  SESSION_STATUS_ACTIVE = 1;
  // SESSION_STATUS_FINISHED means the session terminated successfully.
  SESSION_STATUS_FINISHED = 2;
  // SESSION_STATUS_FAILED means the session terminated with an error subtype.
  SESSION_STATUS_FAILED = 3;
}

// TerminationSubtype is the typed outcome carried on a terminal Result and the
// TurnFinished/TurnAborted event (FR-LOOP-02). Every completed run reports exactly
// one of these. The set is NOT closed at the original five: a model refusal is a
// first-class subtype (TERMINATION_SUBTYPE_REFUSAL) distinct from
// TERMINATION_SUBTYPE_ERROR_DURING_EXECUTION (architecture 11.3); future subtypes
// are added the same way. Mirrors domain.TerminationReason.
enum TerminationSubtype {
  // TERMINATION_SUBTYPE_UNSPECIFIED is the unset value; never emitted on a
  // terminal Result.
  TERMINATION_SUBTYPE_UNSPECIFIED = 0;
  // TERMINATION_SUBTYPE_SUCCESS means the loop completed normally with a
  // text-only final response.
  TERMINATION_SUBTYPE_SUCCESS = 1;
  // TERMINATION_SUBTYPE_ERROR_MAX_TURNS means the configured max-turns cap fired
  // before completion.
  TERMINATION_SUBTYPE_ERROR_MAX_TURNS = 2;
  // TERMINATION_SUBTYPE_ERROR_MAX_BUDGET_USD means the accumulated cost exceeded
  // the configured budget cap.
  TERMINATION_SUBTYPE_ERROR_MAX_BUDGET_USD = 3;
  // TERMINATION_SUBTYPE_ERROR_DURING_EXECUTION means an unrecoverable execution
  // error (e.g. a provider error that exhausted the retry budget, or an
  // interrupt) ended the run. A model refusal is explicitly NOT folded here; it
  // reports TERMINATION_SUBTYPE_REFUSAL instead (architecture 11.3).
  TERMINATION_SUBTYPE_ERROR_DURING_EXECUTION = 4;
  // TERMINATION_SUBTYPE_ERROR_MAX_STRUCTURED_OUTPUT_RETRIES means structured-output
  // validation failed past its retry budget.
  TERMINATION_SUBTYPE_ERROR_MAX_STRUCTURED_OUTPUT_RETRIES = 5;
  // TERMINATION_SUBTYPE_REFUSAL means the model declined to comply (llm.StopRefusal
  // / domain.Refusal maps here). It is a first-class outcome — distinct from and
  // explicitly NOT folded into TERMINATION_SUBTYPE_ERROR_DURING_EXECUTION — so a
  // refusal can drive a fallback-model policy and is reported separately
  // (architecture 11.3).
  TERMINATION_SUBTYPE_REFUSAL = 6;
}

// CreateSessionRequest creates a new session.
message CreateSessionRequest {
  // tenant_id is the owning tenant; it scopes the session under RLS and is
  // verified against the caller's authenticated principal.
  string tenant_id = 1;
  // mode is the initial permission mode for the session. PERMISSION_MODE_UNSPECIFIED
  // applies the server default. PERMISSION_MODE_BYPASS is rejected here when set by
  // a client (it is operator-only, server-side).
  PermissionMode mode = 2;
  // metadata is optional opaque client-supplied key/value labels recorded with the
  // session (e.g. a task id or trace correlation tag).
  map<string, string> metadata = 3;
}

// CreateSessionResponse returns the created session id.
message CreateSessionResponse {
  // session_id is the id of the newly created session.
  string session_id = 1;
}

// GetSessionRequest identifies the session to inspect.
message GetSessionRequest {
  // tenant_id is the owning tenant; verified against the caller.
  string tenant_id = 1;
  // session_id is the session to inspect.
  string session_id = 2;
}

// Session is the materialized, read-only projection of a session's state folded
// from the event log.
message Session {
  // session_id is the session's unique id.
  string session_id = 1;
  // tenant_id is the owning tenant.
  string tenant_id = 2;
  // status is the lifecycle state.
  SessionStatus status = 3;
  // mode is the current permission mode.
  PermissionMode mode = 4;
  // head_seq is the sequence number of the last appended event (the optimistic
  // version); a client may pass it as after_seq to resume from the current head.
  int64 head_seq = 5;
  // total_usage is the accumulated normalized token usage across the session.
  Usage total_usage = 6;
  // total_cost_usd is the accumulated cost in USD across the session.
  double total_cost_usd = 7;
  // num_turns is the number of completed turns so far.
  int64 num_turns = 8;
  // parent_session_id is the parent session id when this session is a fork; empty
  // otherwise.
  string parent_session_id = 9;
  // forked_from_seq is the frozen parent seq this session branched at when it is a
  // fork; zero/unset otherwise.
  int64 forked_from_seq = 10;
}

// GetSessionResponse returns the materialized session state.
message GetSessionResponse {
  // session is the materialized session state.
  Session session = 1;
}

// RunRequest submits a user turn to a session and opens the resumable event
// stream.
message RunRequest {
  // tenant_id is the owning tenant; verified against the caller and used to scope
  // RLS.
  string tenant_id = 1;
  // session_id is the target session (created via CreateSession or returned by
  // Fork).
  string session_id = 2;
  // message is the user turn to submit. On a pure reconnect (no new input) it may
  // be omitted and only after_seq supplied.
  Message message = 3;
  // after_seq is the resumable cursor (Last-Event-ID): the server replays only
  // events with seq strictly greater than after_seq, then continues live. Zero
  // streams from the start of the session (FR-API-01).
  int64 after_seq = 4;
  // output_schema is an OPTIONAL JSON Schema (a JSON object encoded as bytes)
  // constraining this run's final response to structured output. Empty/unset
  // means free-form. The loop validates each response against it and retries up
  // to the configured cap, terminating with
  // TERMINATION_SUBTYPE_ERROR_MAX_STRUCTURED_OUTPUT_RETRIES on exhaustion; where
  // the provider supports it the gateway also maps it onto native response_format.
  // Mirrors llm.Request.OutputSchema / GenerationParams.output_schema.
  bytes output_schema = 5;
  // strict requests provider-native strict enforcement of output_schema where
  // supported (Capabilities.supports_json_schema_strict); otherwise the loop
  // falls back to validate-and-retry. Meaningful only when output_schema is set.
  // Mirrors llm.Request.Strict / GenerationParams.strict.
  bool strict = 6;
}

// ApprovalRequest is streamed to the client when a tool call requires
// human-in-the-loop approval (the ask gate). The client responds out-of-band via
// Control with Approve/Deny carrying the same call_id (architecture 3, FR-PERM-04).
message ApprovalRequest {
  // call_id is the opaque tool-call id this approval pertains to; the client
  // echoes it back on the Control decision.
  string call_id = 1;
  // tool_name is the name of the tool awaiting approval.
  string tool_name = 2;
  // args_json is the parsed tool arguments (a JSON object string) shown to the
  // human for the approval decision.
  string args_json = 3;
  // reason is a human-readable explanation of why approval is required (e.g.
  // mode-gated, external egress to a non-allowlisted host, taint gate).
  string reason = 4;
}

// RunResult is the terminal frame of a Run stream: the final assistant text plus
// the typed termination subtype and the run's accumulated usage and cost
// (FR-LOOP-02). It is always the last RunEvent of a completed run.
message RunResult {
  // subtype is the typed termination outcome.
  TerminationSubtype subtype = 1;
  // final_text is the model's final text-only response (empty for non-success
  // terminations that produced no final text).
  string final_text = 2;
  // usage is the run's accumulated normalized token usage.
  Usage usage = 3;
  // cost_usd is the run's accumulated cost in USD.
  double cost_usd = 4;
  // num_turns is the number of turns the run executed.
  int64 num_turns = 5;
}

// RunEvent is one frame of the resumable Run server stream. Every frame carries
// its own per-session seq (the Last-Event-ID for reconnect) plus exactly one
// payload variant; a result variant is always the last frame (spec 7.1,
// FR-API-01).
message RunEvent {
  // seq is the monotonic per-session sequence number of the event this frame
  // delivers; a reconnecting client passes the last seq it received as
  // RunRequest.after_seq or ControlRequest's Reattach.from_seq.
  int64 seq = 1;
  // payload holds exactly one frame variant.
  oneof payload {
    // text_delta is an incremental chunk of assistant text.
    TextDelta text_delta = 2;
    // thinking_delta is an incremental chunk of reasoning/thinking text.
    ThinkingDelta thinking_delta = 3;
    // tool_progress is interim progress/partial stdout from a running tool.
    ToolProgress tool_progress = 4;
    // approval_request asks the client for a human approval decision.
    ApprovalRequest approval_request = 5;
    // result is the terminal outcome of the run; it is the last frame.
    RunResult result = 6;
  }
}

// ApproveAction approves a pending tool-execution request.
message ApproveAction {
  // call_id is the tool-call id being approved; it matches a prior
  // ApprovalRequest.call_id.
  string call_id = 1;
}

// DenyAction denies a pending tool-execution request.
message DenyAction {
  // call_id is the tool-call id being denied; it matches a prior
  // ApprovalRequest.call_id.
  string call_id = 1;
  // reason is an optional human-readable denial reason, recorded on the
  // ApprovalDenied event.
  string reason = 2;
}

// InterruptAction cooperatively interrupts the in-flight turn, leaving the session
// in a resumable state (FR-LOOP-03). It carries no fields beyond the session_id on
// the enclosing ControlRequest.
message InterruptAction {}

// ReattachAction re-opens delivery for a session after a disconnect, replaying
// events with seq greater than from_seq (FR-API-02). The replay itself is
// delivered on a subsequent Run stream (or the REST SSE facade); this action
// records the client's intent and resume cursor.
message ReattachAction {
  // from_seq is the last seq the client received; the server replays only events
  // with seq strictly greater than it. Zero replays from the start of the session.
  int64 from_seq = 1;
}

// ControlRequest is an out-of-band control action on a session, decoupled from the
// Run data stream. Exactly one action variant is set; every action is authorized
// against session ownership (FR-API-02).
message ControlRequest {
  // tenant_id is the owning tenant; verified against the caller.
  string tenant_id = 1;
  // session_id is the target session for the action.
  string session_id = 2;
  // action holds exactly one control-action variant.
  oneof action {
    // approve approves a pending tool call.
    ApproveAction approve = 3;
    // deny denies a pending tool call.
    DenyAction deny = 4;
    // interrupt cooperatively interrupts the in-flight turn.
    InterruptAction interrupt = 5;
    // reattach re-opens delivery from a resume cursor.
    ReattachAction reattach = 6;
  }
}

// ControlResponse acknowledges a control action.
message ControlResponse {
  // head_seq is the session's head sequence after the action's resulting event (if
  // any) was appended — e.g. the seq of the ApprovalGranted/ApprovalDenied/abort
  // event. For Reattach it is the current head at the time of the call.
  int64 head_seq = 1;
}

// ForkRequest forks a session at a given sequence.
message ForkRequest {
  // tenant_id is the owning tenant; the caller must own the parent session or the
  // call returns PERMISSION_DENIED.
  string tenant_id = 1;
  // session_id is the parent session to fork.
  string session_id = 2;
  // at_seq is the frozen parent sequence the fork branches at; the child's
  // sequence continues from at_seq+1 (FR-STATE-03).
  int64 at_seq = 3;
}

// ForkResponse returns the new child session.
message ForkResponse {
  // session_id is the id of the newly created child session.
  string session_id = 1;
}
