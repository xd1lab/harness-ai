// Boltrope shared wire contracts.
//
// This file is the protobuf projection of the canonical, provider-agnostic LLM
// model defined in Go at internal/platform/llm (the single source of truth per
// ADR-0004, ADR-0016, and architecture sections 11 and 12.3). The Go `llm`
// package — NOT this file — is authoritative; these messages exist only to carry
// the normalized model across the orchestrator <-> model-gateway gRPC boundary,
// and adapters map gen/ <-> llm at the transport edge only (architecture 12.3).
//
// Scope: messages, content parts, tool definitions/calls/results, usage, the
// open stop-reason set, and the streamed-generation StreamEvent oneof. RPC
// request/response envelopes live in the per-service protos that import this one.
syntax = "proto3";

package boltrope.v1;

// Role identifies the author of a Message in a normalized conversation.
//
// The three concrete roles are the provider-agnostic union across all four
// supported provider families. Each model-gateway adapter maps a Role onto its
// wire representation (e.g. Anthropic merges tool results into a user turn;
// OpenAI Chat Completions uses a dedicated "tool" role). Mirrors llm.Role.
enum Role {
  // ROLE_UNSPECIFIED is the unset zero value; a well-formed Message MUST set a
  // concrete role. It is never produced by an adapter.
  ROLE_UNSPECIFIED = 0;
  // ROLE_USER is a turn authored by the end user (or, after normalization, the
  // turn that carries tool results back to the model).
  ROLE_USER = 1;
  // ROLE_ASSISTANT is a turn authored by the model, including text, thinking,
  // and tool-call content parts.
  ROLE_ASSISTANT = 2;
  // ROLE_TOOL is a turn that carries the result of a tool execution. Some
  // providers model tool results as a distinct role; others fold them into a
  // user turn. Adapters normalize this difference.
  ROLE_TOOL = 3;
}

// StopReason is the normalized reason a generation stopped. It is an OPEN set,
// not a closed enum: known reasons are first-class enum values, and any provider
// reason that does not map to one is normalized to STOP_REASON_OTHER with the
// original provider string preserved out-of-band (see Done.raw_stop_reason /
// GenerateResponse). An unrecognized reason is therefore passed through and
// logged, never silently dropped (ADR-0004, ADR-0016, architecture 11.3).
//
// STOP_REASON_PAUSE is special: it is a NON-TERMINAL continuation signal,
// distinct from all terminal reasons. The agent loop branches on three outcomes
// — final / needs-tool-execution (STOP_REASON_TOOL_USE) / needs-continuation
// (STOP_REASON_PAUSE) — rather than two. Mirrors llm.StopReason; the Go side's
// StopReason.IsTerminal() treats every value except PAUSE as terminal.
enum StopReason {
  // STOP_REASON_UNSPECIFIED is the unset zero value. Adapters always set a
  // concrete reason on a terminal event; this value is never emitted.
  STOP_REASON_UNSPECIFIED = 0;
  // STOP_REASON_END is a normal, complete end of turn (the model finished).
  STOP_REASON_END = 1;
  // STOP_REASON_MAX_TOKENS means generation hit the requested output-token
  // limit.
  STOP_REASON_MAX_TOKENS = 2;
  // STOP_REASON_TOOL_USE means the model is requesting one or more tool calls
  // and is waiting for their results. Terminal for the generation step; the loop
  // continues by executing tools and sending results back.
  STOP_REASON_TOOL_USE = 3;
  // STOP_REASON_STOP_SEQUENCE means generation halted because a configured stop
  // sequence was produced.
  STOP_REASON_STOP_SEQUENCE = 4;
  // STOP_REASON_CONTENT_FILTER means generation was halted by a provider content
  // filter / safety system.
  STOP_REASON_CONTENT_FILTER = 5;
  // STOP_REASON_REFUSAL means the model declined to comply. It is first-class
  // and maps to a distinct termination subtype (e.g. a fallback-model policy),
  // NOT folded into an execution error (architecture 11.3).
  STOP_REASON_REFUSAL = 6;
  // STOP_REASON_CONTEXT_WINDOW_EXCEEDED means input plus generation exceeded the
  // model's context window. First-class so the loop can apply a compact-and-retry
  // policy, distinct from STOP_REASON_MAX_TOKENS.
  STOP_REASON_CONTEXT_WINDOW_EXCEEDED = 7;
  // STOP_REASON_PAUSE is a NON-TERMINAL outcome: the provider paused the turn and
  // expects the response to be echoed back (via provider_raw) to continue (e.g.
  // Anthropic pause_turn for server-side tools). Anthropic-only in v1.
  STOP_REASON_PAUSE = 8;
  // STOP_REASON_OTHER is the open-set escape hatch: a provider reason that maps
  // to no value above. The original provider string is preserved in the carrying
  // message's raw_stop_reason field.
  STOP_REASON_OTHER = 9;
}

// Usage is the normalized token accounting for a turn. Provider usage semantics
// differ (Anthropic cumulative message_delta with a cache split, Gemini per-chunk
// usageMetadata, OpenAI Responses chained-input billing); the model-gateway reads
// the authoritative field per surface and normalizes to these four counters
// (architecture 11.6). Cost is computed in the gateway from this Usage and model
// pricing, never recomputed downstream. Mirrors llm.Usage.
message Usage {
  // input_tokens is the number of prompt/input tokens billed at the standard
  // input rate (excludes cache reads and writes, billed separately).
  int64 input_tokens = 1;
  // output_tokens is the number of generated/output tokens.
  int64 output_tokens = 2;
  // cache_read_tokens is the number of input tokens served from a prompt cache
  // (typically billed at a reduced rate).
  int64 cache_read_tokens = 3;
  // cache_write_tokens is the number of input tokens written to a prompt cache
  // (typically billed at a premium).
  int64 cache_write_tokens = 4;
  // reasoning_tokens is the number of reasoning/thinking tokens the model
  // generated, reported separately for auditing. By convention it is a SUBSET of
  // output_tokens (already counted there for billing) unless a provider bills
  // reasoning tokens separately, in which case the adapter reflects the provider's
  // accounting. Zero when the provider does not report it. Mirrors
  // llm.Usage.ReasoningTokens.
  int64 reasoning_tokens = 5;
}

// TextPart is a plain text content fragment. Mirrors llm.TextPart.
message TextPart {
  // text is the literal text.
  string text = 1;
}

// ThinkingPart is a reasoning / extended-thinking content fragment.
//
// signature carries any provider-opaque thinking signature that must be returned
// unmodified on a subsequent call (e.g. Anthropic extended-thinking signatures).
// The authoritative copy for replay rides in the provider_raw continuation slot
// (architecture 11.1); it is kept here so a single thinking part is
// self-describing when present. Mirrors llm.ThinkingPart.
message ThinkingPart {
  // text is the human-readable reasoning text. It may be empty when the provider
  // omits or summarizes thinking content.
  string text = 1;
  // signature is the opaque, provider-scoped signature for this thinking block,
  // to be returned unmodified on continuation. Empty when the provider does not
  // use signed thinking.
  string signature = 2;
}

// ImagePart is an image input, normalized across the providers' differing image
// block shapes (Anthropic image block, Gemini inlineData Blob, OpenAI image_url /
// input_image). Exactly one of data, url, or file_ref is set; media_type always
// accompanies inline data so the adapter can render the correct wire shape.
// Mirrors llm.ImagePart.
message ImagePart {
  // media_type is the IANA media type of the image, e.g. "image/png" or
  // "image/jpeg". Required when data is set.
  string media_type = 1;
  // data is the raw (un-encoded) image bytes for an inline image. Adapters
  // base64-encode as the wire format requires.
  bytes data = 2;
  // url is a remote image URL, for providers/models that accept image references
  // by URL.
  string url = 3;
  // file_ref is a provider-side file identifier for a previously uploaded image.
  string file_ref = 4;
}

// ToolCall is a model request to invoke a tool. It appears as the tool_call
// variant of a ContentPart on an assistant Message.
//
// id is an opaque, provider-scoped identifier for this specific call, matched by
// ToolResult.call_id when the result is fed back. args is the PARSED argument
// object: the OpenAI Chat Completions adapter parses the JSON-string
// function.arguments into structured form while Anthropic and Gemini already
// deliver an object, so the orchestrator always sees parsed arguments regardless
// of provider (ADR-0016). Mirrors llm.ToolCall (args carried as a JSON object
// string; see args_json).
message ToolCall {
  // id is the opaque per-call identifier assigned by the provider/adapter.
  string id = 1;
  // name is the name of the tool to invoke; it matches a ToolDefinition.name.
  string name = 2;
  // args_json is the parsed tool arguments encoded as a JSON object string. It is
  // a serialized object (not a wire struct) so the gateway forwards the exact
  // bytes the orchestrator will hand back as parsed args, matching llm.ToolCall's
  // map[string]any without imposing protobuf Struct's value coercions.
  string args_json = 3;
}

// ToolResult is the outcome of executing a ToolCall, fed back to the model. It
// appears as the tool_result variant of a ContentPart. Mirrors llm.ToolResult.
message ToolResult {
  // call_id matches the ToolCall.id this result answers.
  string call_id = 1;
  // content is the textual result of the tool execution, as the model should see
  // it.
  string content = 2;
  // is_error reports whether the tool execution failed; when true, the model is
  // told the call errored so it can adapt.
  bool is_error = 3;
}

// ContentPart is a discriminated union over the kinds of content a Message turn
// can carry. Exactly one variant is set. Modeling content as a union (rather than
// a flat string) lets a single turn carry interleaved text, reasoning, images,
// tool calls, and tool results — which every provider family requires in some
// form. Ordering of parts within a Message is significant and preserved. Mirrors
// llm.ContentPart.
message ContentPart {
  // part holds exactly one content variant.
  oneof part {
    // text is set for a plain text fragment.
    TextPart text = 1;
    // image is set for an image input (vision).
    ImagePart image = 2;
    // thinking is set for a reasoning/extended-thinking fragment.
    ThinkingPart thinking = 3;
    // tool_call is set for a model request to invoke a tool.
    ToolCall tool_call = 4;
    // tool_result is set for the result of a previously requested tool call.
    ToolResult tool_result = 5;
  }
}

// Message is one normalized turn in a conversation: a Role plus an ordered list
// of ContentParts. Part ordering is significant and preserved across
// normalization (e.g. thinking before text, text before tool calls).
//
// A Message is the model-visible projection of a turn. Provider-opaque
// continuation state (Anthropic server_tool_use blocks and thinking signatures,
// OpenAI Responses Items) is the byte-faithful source of truth for the next
// provider call and is carried separately in the provider_raw slot, not in the
// Message itself (ADR-0016, architecture 11.1). Mirrors llm.Message.
message Message {
  // role is the author of this turn.
  Role role = 1;
  // content is the ordered list of content parts that make up this turn.
  repeated ContentPart content = 2;
}

// ToolChoice constrains whether and which tool the model may call on a request.
// The sentinel values cover the provider-agnostic policies; to force a specific
// tool, set TOOL_CHOICE_TOOL and supply tool_name on the request. Mirrors
// llm.ToolChoice (whose string carries either a sentinel or a specific tool
// name); the gateway maps these to each provider's vocabulary.
enum ToolChoice {
  // TOOL_CHOICE_UNSPECIFIED is the unset value: the adapter applies the provider
  // default (equivalent to TOOL_CHOICE_AUTO).
  TOOL_CHOICE_UNSPECIFIED = 0;
  // TOOL_CHOICE_AUTO lets the model decide whether to call a tool.
  TOOL_CHOICE_AUTO = 1;
  // TOOL_CHOICE_ANY requires the model to call at least one of the provided
  // tools.
  TOOL_CHOICE_ANY = 2;
  // TOOL_CHOICE_REQUIRED is a synonym for TOOL_CHOICE_ANY in some provider
  // vocabularies; adapters treat it as "must call some tool".
  TOOL_CHOICE_REQUIRED = 3;
  // TOOL_CHOICE_NONE forbids tool calls for this request.
  TOOL_CHOICE_NONE = 4;
  // TOOL_CHOICE_TOOL requires the model to call the specific tool named by the
  // request's tool_name field.
  TOOL_CHOICE_TOOL = 5;
}

// ToolDefinition is a normalized declaration of a tool the model may call. All
// four provider families accept JSON-Schema-shaped parameters; only the wrapper
// differs, so the schema is carried verbatim as a JSON string and the adapter
// supplies the per-provider envelope. Strict-schema enforcement is gated by
// Capabilities.supports_json_schema_strict. Mirrors llm.ToolDef.
message ToolDefinition {
  // name is the unique tool name the model uses to invoke the tool.
  string name = 1;
  // description tells the model what the tool does and when to call it. Adapters
  // pass it through unchanged.
  string description = 2;
  // json_schema is the tool's input schema as a raw JSON Schema document (a JSON
  // object encoded as a string). It is kept opaque so the gateway forwards it
  // without re-encoding.
  string json_schema = 3;
}

// TextDelta is an incremental chunk of assistant text to append to the visible
// response. It is shared because it is produced by the model-gateway Generate
// stream and relayed unchanged to the client on the orchestrator Run stream
// (spec 7.2 lists the streamed frame variants as common types). Mirrors
// llm.TextDelta.
message TextDelta {
  // text is the text fragment.
  string text = 1;
}

// ThinkingDelta is an incremental chunk of reasoning/thinking text; its content
// may be empty when the provider streams thinking blocks without surfacing their
// text. Shared between the model-gateway Generate stream and the orchestrator Run
// stream. Mirrors llm.ThinkingDelta.
message ThinkingDelta {
  // text is the thinking-text fragment.
  string text = 1;
  // signature is an opaque thinking-signature fragment, when the provider emits
  // one. The gateway accumulates the final signature into the provider_raw
  // continuation slot; it is exposed here only for completeness.
  string signature = 2;
}

// ToolProgress is an interim tool-execution event: a human-readable progress note
// and/or a chunk of partial stdout from a long-running tool, streamed before the
// terminal result (architecture 3, 4.2). Shared because tool-runtime produces it
// on the ExecuteTool stream and the orchestrator relays it to the client on the
// Run stream.
message ToolProgress {
  // message is an optional human-readable progress note.
  string message = 1;
  // stdout_chunk is an optional fragment of the tool's standard output produced so
  // far. Fragments are ordered and concatenable.
  bytes stdout_chunk = 2;
}
