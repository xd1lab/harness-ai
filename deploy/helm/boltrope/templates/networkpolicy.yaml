{{- include "boltrope.guards" . -}}
{{- if .Values.networkPolicy.enabled -}}
# Baseline segmentation: default-deny ingress for every Boltrope pod, then
# admit only the legitimate paths. Egress stays open (modelgwd → provider,
# toolruntimed → image registry, everyone → Postgres/SPIRE/OTLP); tighten per
# cluster. mTLS still authenticates every inter-service connection — this is
# defense in depth, not the auth boundary.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "boltrope.fullname" . }}-default-deny
  labels:
    {{- include "boltrope.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "boltrope.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress]
---
# orchestratord: the only client-facing pod — gRPC edge + HTTP (REST/health)
# from anywhere the cluster routes (front it with the ingress + TLS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "boltrope.fullname" . }}-orchestratord-edge
  labels:
    {{- include "boltrope.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "boltrope.selectorLabels" (dict "ctx" . "component" "orchestratord") | nindent 6 }}
  policyTypes: [Ingress]
  ingress:
    - ports:
        - port: 9000
        - port: 8080
---
# Downstream services accept gRPC only from orchestratord (plus HTTP probes,
# which kubelet sends from the node and NetworkPolicy does not block).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "boltrope.fullname" . }}-downstream-from-orchestrator
  labels:
    {{- include "boltrope.labels" . | nindent 4 }}
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [modelgwd, toolruntimed]
    matchLabels:
      app.kubernetes.io/name: {{ include "boltrope.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "boltrope.selectorLabels" (dict "ctx" . "component" "orchestratord") | nindent 14 }}
      ports:
        - port: 9000
{{- end }}
