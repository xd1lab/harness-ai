      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: toolruntimed-arm64
    goos: linux
    goarch: arm64
    ids: [toolruntimed]
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - "ghcr.io/xd1lab/boltrope-toolruntimed:{{ .Version }}-arm64"
      - "ghcr.io/xd1lab/boltrope-toolruntimed:latest-arm64"
    build_flag_templates:
