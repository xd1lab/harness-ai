# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
# SPDX-License-Identifier: Apache-2.0
#
# GoReleaser configuration for Boltrope (NFR-PORT-04, DOD-10; ADR-0006).
#
# On a tag push, .github/workflows/release.yml runs `goreleaser release`, which:
#   - cross-compiles the six cmd/ binaries as static (CGO_OFF) linux amd64+arm64
#     binaries with ldflags version stamping (main.version / .commit / .date) and
#     ships them in the release archives + checksums (the harnessctl client also
#     gets darwin/windows builds);
#   - builds and pushes multi-arch Docker images to GHCR, joined by a manifest,
#     reusing the repo's single multi-target ./Dockerfile (one stage per service,
#     selected with --target; the same Dockerfile deploy/docker-compose.yml uses).
#     That Dockerfile compiles the in-image binary from source in its `builder`
#     stage with -X main.version=$VERSION, so the image binary is version-stamped
#     identically to the archived one;
#   - generates an SBOM per archive with syft;
#   - signs checksums and images keylessly with cosign (Sigstore/Fulcio/Rekor),
#     using the workflow's OIDC token (no long-lived keys);
#   - emits SLSA build provenance attestations for the binaries.
#
# Validate without releasing:  goreleaser check   /   goreleaser release --snapshot --clean
#
# NOTE: the `boltrope` owner segment in image names and the module path is a
# PLACEHOLDER. Rename it to the real GitHub org/user before the first public tag.
version: 2

project_name: boltrope

before:
  hooks:
    - go mod download

# ── Binaries ────────────────────────────────────────────────────────────────
# One build per cmd/ entrypoint. Static, reproducible-ish (-trimpath), linux
# only for v1 (the runtime targets Linux amd64/arm64; NFR-PORT-01).
builds:
  - id: orchestratord
    main: ./cmd/boltrope-orchestratord
    binary: boltrope-orchestratord
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}

  - id: modelgwd
    main: ./cmd/boltrope-modelgwd
    binary: boltrope-modelgwd
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}

  - id: toolruntimed
    main: ./cmd/boltrope-toolruntimed
    binary: boltrope-toolruntimed
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}

  - id: projectord
    main: ./cmd/boltrope-projectord
    binary: boltrope-projectord
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}

  - id: migrate
    main: ./cmd/boltrope-migrate
    binary: boltrope-migrate
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    goos: [linux]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}

  - id: harnessctl
    main: ./cmd/harnessctl
    binary: harnessctl
    env: [CGO_ENABLED=0]
    flags: [-trimpath]
    # The client CLI is useful off-Linux too.
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .FullCommit }}
      - -X main.date={{ .CommitDate }}

# ── Archives ────────────────────────────────────────────────────────────────
archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"

# ── SBOM (syft) ─────────────────────────────────────────────────────────────
# One SPDX-JSON SBOM per produced archive.
sboms:
  - id: archive
    artifacts: archive

# ── Container images → GHCR (per-arch, joined by a manifest below) ──────────
dockers:
  - id: orchestratord-amd64
    goos: linux
    goarch: amd64
    ids: [orchestratord]
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/boltrope/boltrope-orchestratord:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-orchestratord:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--target=orchestratord"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/boltrope/boltrope"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
  - id: orchestratord-arm64
    goos: linux
    goarch: arm64
    ids: [orchestratord]
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/boltrope/boltrope-orchestratord:{{ .Version }}-arm64"
      - "ghcr.io/boltrope/boltrope-orchestratord:latest-arm64"
    build_flag_templates:
