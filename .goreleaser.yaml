    ids: [modelgwd]
    dockerfile: Dockerfile.release
    use: buildx
    image_templates:
      - "ghcr.io/xd1lab/boltrope-modelgwd:{{ .Version }}-amd64"
      - "ghcr.io/xd1lab/boltrope-modelgwd:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--target=modelgwd"
