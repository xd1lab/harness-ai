      - "ghcr.io/xd1lab/boltrope-projectord:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xd1lab/boltrope-projectord:latest"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-projectord:latest-amd64"
      - "ghcr.io/xd1lab/boltrope-projectord:latest-arm64"

  - name_template: "ghcr.io/xd1lab/boltrope-migrate:{{ .Version }}"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-migrate:{{ .Version }}-amd64"
      - "ghcr.io/xd1lab/boltrope-migrate:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xd1lab/boltrope-migrate:latest"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-migrate:latest-amd64"
      - "ghcr.io/xd1lab/boltrope-migrate:latest-arm64"

# ── Keyless signing (cosign + Sigstore) ─────────────────────────────────────
# Signs the checksums file; the OIDC token comes from the release workflow.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Keyless signing of every pushed image + manifest.
docker_signs:
  - cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"
    artifacts: all
    output: true

# NOTE: SLSA build-provenance attestation is a future opt-in — the top-level
# `attestations:` key is GoReleaser Pro-only (`goreleaser check` on OSS v2.16.0
# rejects it: "field attestations not found in type config.Project").

# ── Release notes / changelog ───────────────────────────────────────────────
# Conventional-Commits grouping; tags are pushed manually by a maintainer (see
# .github/workflows/release.yml) and this changelog is the release notes.
changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"

release:
  github:
    owner: xd1lab
    name: harness-ai
  prerelease: auto
