      - "ghcr.io/boltrope/boltrope-modelgwd:latest-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--target=modelgwd"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/boltrope/boltrope"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: toolruntimed-amd64
    goos: linux
    goarch: amd64
    ids: [toolruntimed]
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/boltrope/boltrope-toolruntimed:{{ .Version }}-amd64"
