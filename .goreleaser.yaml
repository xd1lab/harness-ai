      - "--target=orchestratord"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/boltrope/boltrope"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"

  - id: modelgwd-amd64
    goos: linux
    goarch: amd64
    ids: [modelgwd]
    dockerfile: Dockerfile
    use: buildx
    image_templates:
      - "ghcr.io/boltrope/boltrope-modelgwd:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-modelgwd:latest-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--target=modelgwd"
      - "--build-arg=VERSION={{ .Version }}"
      - "--label=org.opencontainers.image.source=https://github.com/boltrope/boltrope"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
