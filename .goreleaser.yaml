# ── Multi-arch manifests (the tags users pull) ──────────────────────────────
docker_manifests:
  - name_template: "ghcr.io/xd1lab/boltrope-orchestratord:{{ .Version }}"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-orchestratord:{{ .Version }}-amd64"
      - "ghcr.io/xd1lab/boltrope-orchestratord:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xd1lab/boltrope-orchestratord:latest"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-orchestratord:latest-amd64"
      - "ghcr.io/xd1lab/boltrope-orchestratord:latest-arm64"

  - name_template: "ghcr.io/xd1lab/boltrope-modelgwd:{{ .Version }}"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-modelgwd:{{ .Version }}-amd64"
      - "ghcr.io/xd1lab/boltrope-modelgwd:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xd1lab/boltrope-modelgwd:latest"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-modelgwd:latest-amd64"
      - "ghcr.io/xd1lab/boltrope-modelgwd:latest-arm64"

  - name_template: "ghcr.io/xd1lab/boltrope-toolruntimed:{{ .Version }}"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-toolruntimed:{{ .Version }}-amd64"
      - "ghcr.io/xd1lab/boltrope-toolruntimed:{{ .Version }}-arm64"
  - name_template: "ghcr.io/xd1lab/boltrope-toolruntimed:latest"
    image_templates:
      - "ghcr.io/xd1lab/boltrope-toolruntimed:latest-amd64"
      - "ghcr.io/xd1lab/boltrope-toolruntimed:latest-arm64"

  - name_template: "ghcr.io/xd1lab/boltrope-projectord:{{ .Version }}"
    image_templates:
