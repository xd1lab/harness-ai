# ── Multi-arch manifests (the tags users pull) ──────────────────────────────
docker_manifests:
  - name_template: "ghcr.io/boltrope/boltrope-orchestratord:{{ .Version }}"
    image_templates:
      - "ghcr.io/boltrope/boltrope-orchestratord:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-orchestratord:{{ .Version }}-arm64"
  - name_template: "ghcr.io/boltrope/boltrope-orchestratord:latest"
    image_templates:
      - "ghcr.io/boltrope/boltrope-orchestratord:latest-amd64"
      - "ghcr.io/boltrope/boltrope-orchestratord:latest-arm64"

  - name_template: "ghcr.io/boltrope/boltrope-modelgwd:{{ .Version }}"
    image_templates:
      - "ghcr.io/boltrope/boltrope-modelgwd:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-modelgwd:{{ .Version }}-arm64"
  - name_template: "ghcr.io/boltrope/boltrope-modelgwd:latest"
    image_templates:
      - "ghcr.io/boltrope/boltrope-modelgwd:latest-amd64"
      - "ghcr.io/boltrope/boltrope-modelgwd:latest-arm64"

  - name_template: "ghcr.io/boltrope/boltrope-toolruntimed:{{ .Version }}"
    image_templates:
      - "ghcr.io/boltrope/boltrope-toolruntimed:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-toolruntimed:{{ .Version }}-arm64"
  - name_template: "ghcr.io/boltrope/boltrope-toolruntimed:latest"
    image_templates:
      - "ghcr.io/boltrope/boltrope-toolruntimed:latest-amd64"
      - "ghcr.io/boltrope/boltrope-toolruntimed:latest-arm64"

  - name_template: "ghcr.io/boltrope/boltrope-projectord:{{ .Version }}"
    image_templates:
      - "ghcr.io/boltrope/boltrope-projectord:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-projectord:{{ .Version }}-arm64"
  - name_template: "ghcr.io/boltrope/boltrope-projectord:latest"
    image_templates:
      - "ghcr.io/boltrope/boltrope-projectord:latest-amd64"
      - "ghcr.io/boltrope/boltrope-projectord:latest-arm64"

  - name_template: "ghcr.io/boltrope/boltrope-migrate:{{ .Version }}"
    image_templates:
      - "ghcr.io/boltrope/boltrope-migrate:{{ .Version }}-amd64"
      - "ghcr.io/boltrope/boltrope-migrate:{{ .Version }}-arm64"
  - name_template: "ghcr.io/boltrope/boltrope-migrate:latest"
    image_templates:
      - "ghcr.io/boltrope/boltrope-migrate:latest-amd64"
      - "ghcr.io/boltrope/boltrope-migrate:latest-arm64"

# ── Keyless signing (cosign + Sigstore) ─────────────────────────────────────
# Signs the checksums file; the OIDC token comes from the release workflow.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Keyless signing of every pushed image + manifest.
docker_signs:
  - cmd: cosign
    args:
      - sign
      - "${artifact}@${digest}"
      - "--yes"
    artifacts: all
    output: true

# ── SLSA build provenance ───────────────────────────────────────────────────
# Attestations for the binary artifacts; uploaded alongside the release.
attestations:
  - id: provenance
    cmd: cosign
    args:
      - attest-blob
      - "--predicate={{ .ArtifactPath }}.slsa.json"
      - "--type=slsaprovenance"
      - "--output-signature={{ .ArtifactPath }}.att"
      - "--yes"
      - "{{ .ArtifactPath }}"
    artifacts: binary

# ── Release notes / changelog ───────────────────────────────────────────────
# Conventional-Commits grouping; release-please owns the human changelog + tag.
changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge conflict"

release:
  github:
    owner: boltrope
    name: boltrope
  prerelease: auto
