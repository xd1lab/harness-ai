name: Feature request
description: Suggest an enhancement for Boltrope
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve? Who benefits?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Checks
      options:
        - label: I checked the roadmap/ADRs and this isn't already planned or intentionally deferred (docs/decisions/0003-v1-scope.md).
          required: true
