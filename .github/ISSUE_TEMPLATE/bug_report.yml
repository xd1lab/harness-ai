name: Bug report
description: Report a defect in Boltrope
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please do **not** report security issues here — see [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps, config, or commands to reproduce.
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Boltrope version / commit
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: LLM provider / backend in use
      options:
        - Anthropic (Claude)
        - Google (Gemini)
        - OpenAI
        - Self-hosted / OpenAI-compatible (vLLM, Ollama, LM Studio, llama.cpp, TGI)
        - LiteLLM proxy
        - Not applicable
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / traces
      description: Paste relevant slog / OpenTelemetry output. Redact secrets.
      render: shell
  - type: input
    id: env
    attributes:
      label: OS / Go version / deployment (Docker, etc.)
